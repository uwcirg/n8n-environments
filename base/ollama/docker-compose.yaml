volumes:
  ollama_storage:

networks:
  internal:
  # ingress network
  ingress:
    external: true
    name: external_web

x-ollama: &service-ollama
  image: ollama/ollama:latest
  networks:
    internal:
      aliases:
        - ollama
  restart: unless-stopped
  volumes:
    - ollama_storage:/root/.ollama

x-init-ollama: &init-ollama
  image: ollama/ollama:latest
  networks:
    - internal
  volumes:
    - ollama_storage:/root/.ollama
  entrypoint: /bin/sh
  environment:
    OLLAMA_HOST: http://ollama:11434
  command:
    - -c
    - sleep 3; ollama pull llama3.2

services:

  ollama-cpu:
    profiles:
      - cpu
    <<: *service-ollama

  ollama-gpu:
    profiles:
      - gpu-nvidia
    <<: *service-ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu

  ollama-gpu-amd:
    profiles:
      - gpu-amd
    <<: *service-ollama
    image: ollama/ollama:rocm
    devices:
      - /dev/kfd
      - /dev/dri

  ollama-pull-llama-cpu:
    profiles:
      - cpu
    <<: *init-ollama
    depends_on:
      - ollama-cpu

  ollama-pull-llama-gpu:
    profiles:
      - gpu-nvidia
    <<: *init-ollama
    depends_on:
      - ollama-gpu

  ollama-pull-llama-gpu-amd:
    profiles:
      - gpu-amd
    <<: *init-ollama
    image: ollama/ollama:rocm
    depends_on:
     - ollama-gpu-amd

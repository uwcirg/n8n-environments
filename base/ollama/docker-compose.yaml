volumes:
  ollama_storage:

networks:
  internal:
  # ingress network
  ingress:
    external: true
    name: external_web

x-ollama: &service-ollama
  image: ollama/ollama:latest
  networks:
    - ingress
  restart: unless-stopped
  volumes:
    - ollama_storage:/root/.ollama
  labels:
    - traefik.enable=true
    # do not require auth for OpenAPI endpoint
    - traefik.http.routers.ollama-openapi.rule=Host(`${OLLAMA_DOMAIN}`) && Path(`/openapi.json`)
    - traefik.http.routers.ollama-openapi.entrypoints=websecure
    - traefik.http.routers.ollama-openapi.tls=true
    - traefik.http.routers.ollama-openapi.tls.certresolver=letsencrypt
    - traefik.http.routers.ollama-openapi.priority=100
    # require Bearer token for all other endpoints
    - traefik.http.routers.ollama-secure.rule=Host(`${OLLAMA_DOMAIN}`) && PathPrefix(`/`) && !Path(`/openapi.json`) && Header(`Authorization`, `Bearer ${OLLAMA_API_KEY}`)
    - traefik.http.routers.ollama-secure.entrypoints=websecure
    - traefik.http.routers.ollama-secure.tls=true
    - traefik.http.routers.ollama-secure.tls.certresolver=letsencrypt
    - traefik.http.routers.ollama-secure.priority=1

x-init-ollama: &init-ollama
  image: ollama/ollama:latest
  networks:
    - internal
  volumes:
    - ollama_storage:/root/.ollama
  entrypoint: /bin/sh
  environment:
    OLLAMA_HOST: http://ollama:11434
  command:
    - -c
    - sleep 3; ollama pull llama3.2

services:

  ollama-cpu:
    profiles:
      - cpu
    <<: *service-ollama

  ollama-gpu:
    profiles:
      - gpu-nvidia
    <<: *service-ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu

  ollama-gpu-amd:
    profiles:
      - gpu-amd
    <<: *service-ollama
    image: ollama/ollama:rocm
    devices:
      - /dev/kfd
      - /dev/dri

  ollama-pull-llama-cpu:
    profiles:
      - cpu
    <<: *init-ollama
    depends_on:
      - ollama-cpu

  ollama-pull-llama-gpu:
    profiles:
      - gpu-nvidia
    <<: *init-ollama
    depends_on:
      - ollama-gpu

  ollama-pull-llama-gpu-amd:
    profiles:
      - gpu-amd
    <<: *init-ollama
    image: ollama/ollama:rocm
    depends_on:
     - ollama-gpu-amd
